<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="geo-rural-api-base" content="">
    <title>Seguimiento de Progreso - Geo Rural</title>
    <link rel="icon" type="image/png" href="../assets/img/logo.png">
    <link rel="stylesheet" href="../assets/css/pages/seguimiento.css?v=20260327-01">
</head>
<body>
    <main class="seguimiento-container">
        <section class="seguimiento-card">
            <header class="seguimiento-header">
                <img src="../assets/img/logo.png" alt="Geo Rural Logo" class="seguimiento-logo">
                <div>
                    <h1>SEGUIMIENTO DE PROGRESO</h1>
                    <p>Ingresa el ROL de la propiedad para revisar el avance de tu proceso.</p>
                </div>
            </header>

            <form id="publicProgressForm" class="seguimiento-form" autocomplete="off">
                <div class="seguimiento-form-row">
                    <div class="seguimiento-field">
                        <label for="publicProgressRol">ROL DE LA PROPIEDAD</label>
                        <input type="text" id="publicProgressRol" maxlength="120" placeholder="Ej: 123-45">
                    </div>
                </div>
                <div class="seguimiento-form-actions">
                    <button type="submit" id="publicProgressSearchBtn" class="seguimiento-search-btn">BUSCAR PROGRESO</button>
                    <button type="button" id="publicProgressClearBtn" class="seguimiento-clear-btn">LIMPIAR</button>
                </div>
            </form>

            <p id="publicProgressMessage" class="seguimiento-message" role="status" aria-live="polite"></p>

            <section id="publicProgressResultSection" class="seguimiento-section hidden">
                <h2>Datos del Cliente</h2>
                <div class="seguimiento-form-row">
                    <div class="seguimiento-field">
                        <label for="publicProgressResultRol">ROL</label>
                        <input type="text" id="publicProgressResultRol" readonly>
                    </div>
                </div>
                <div class="seguimiento-form-row">
                    <div class="seguimiento-field">
                        <label for="publicProgressNombre">NOMBRE PROPIETARIO</label>
                        <input type="text" id="publicProgressNombre" readonly>
                    </div>
                    <div class="seguimiento-field">
                        <label for="publicProgressCorreo">CORREO</label>
                        <input type="text" id="publicProgressCorreo" readonly>
                    </div>
                </div>
                <div class="seguimiento-form-row">
                    <div class="seguimiento-field">
                        <label for="publicProgressNombrePredio">NOMBRE PREDIO</label>
                        <input type="text" id="publicProgressNombrePredio" readonly>
                    </div>
                    <div class="seguimiento-field">
                        <label for="publicProgressRegion">REGION</label>
                        <input type="text" id="publicProgressRegion" readonly>
                    </div>
                    <div class="seguimiento-field">
                        <label for="publicProgressComuna">COMUNA</label>
                        <input type="text" id="publicProgressComuna" readonly>
                    </div>
                </div>

                <div class="seguimiento-field">
                    <label>HISTORIAL DE PROGRESO</label>
                    <div class="seguimiento-table-wrapper">
                        <table class="seguimiento-table">
                            <thead>
                                <tr>
                                    <th>FECHA</th>
                                    <th>DETALLE</th>
                                </tr>
                            </thead>
                            <tbody id="publicProgressHistoryBody">
                                <tr>
                                    <td colspan="2">Sin historial de progreso para mostrar.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <p class="seguimiento-link-row">
                <a href="/geo_rural/registro/login/registro.html">Acceso interno del equipo Geo Rural</a>
            </p>
        </section>
    </main>

    <script src="../assets/js/pages/seguimiento.js?v=20260410-02"></script>
</body>
</html>
